<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King's Day Wheel 👑</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', sans-serif; text-align: center; background: #fb8c00; background: radial-gradient(circle, #ff9800, #ef6c00, #222); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { max-width: 90vw; max-height: 90vw; filter: drop-shadow(0 0 30px rgba(0,0,0,0.6)); border-radius: 50%; }
        #spin { margin-top: 30px; padding: 20px 60px; font-size: 24px; cursor: pointer; background: #fff; color: #ef6c00; border: none; border-radius: 50px; font-weight: 900; box-shadow: 0 8px 25px rgba(0,0,0,0.3); transition: 0.2s; text-transform: uppercase; letter-spacing: 2px; -webkit-tap-highlight-color: transparent; }
        #spin:active { transform: scale(0.9); }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        #modal-content { background: #fff; color: #333; padding: 40px; border-radius: 40px; width: 85%; max-width: 450px; border: 8px solid #ff9800; animation: popIn 0.5s cubic-bezier(0.26, 0.53, 0.74, 1.48); text-align: center; }
        #modal-task { font-size: 38px; font-weight: 900; margin: 20px 0; color: #e65100; text-transform: uppercase; line-height: 1.2; }
        #close-modal { padding: 15px 40px; background: #e65100; color: white; border-radius: 30px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
    </style>
</head>
<body>

    <h1 style="margin-bottom:10px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5);">PROOST! 🍻</h1>
    <canvas id="canvas" width="500" height="500"></canvas>
    <button id="spin">GO ORANGE 👑</button>

    <div id="modal">
        <div id="modal-content">
            <p style="margin:0; font-weight:bold; color:#f57c00; letter-spacing:1px;">👑 THE ROYAL DECREE 👑</p>
            <div id="modal-task"></div>
            <button id="close-modal">NEXT LEGEND</button>
        </div>
    </div>

    <script>
        // Cleaned up tasks to be shorter
        const tasks = ["2 SHOTS 🥃", "FREE HUG 🫂", "DANCE! 🕺", "WATER 💧", "TAKE SHOT 🍺", "KING'S PASS 👑", "VICTIM 🎯", "SING! 🎤"];
        const colors = ["#FF6D00", "#FF8008", "#FFA000", "#FFB300", "#FF6D00", "#FF8008", "#FFA000", "#FFB300"];
        
        let startAngle = 0;
        let arc = Math.PI / (tasks.length / 2);
        let spinTimeout = null;
        let spinAngleStart = 10;
        let spinTime = 0;
        let spinTimeTotal = 0;
        let ctx;

        function drawWheel() {
            const canvas = document.getElementById("canvas");
            ctx = canvas.getContext("2d");
            ctx.clearRect(0,0,500,500);
            
            for(let i = 0; i < tasks.length; i++) {
                let angle = startAngle + i * arc;
                ctx.fillStyle = colors[i];
                ctx.beginPath();
                ctx.arc(250, 250, 230, angle, angle + arc, false);
                ctx.lineTo(250, 250);
                ctx.fill();
                
                ctx.save();
                ctx.fillStyle = "white";
                // Smaller font and moved further out (160 instead of 140)
                ctx.font = 'bold 16px Arial'; 
                ctx.translate(250 + Math.cos(angle + arc / 2) * 160, 250 + Math.sin(angle + arc / 2) * 160);
                ctx.rotate(angle + arc / 2 + Math.PI / 2);
                
                // This splits the text into two lines if it's too long, 
                // but for now we'll just keep it short and clean.
                ctx.fillText(tasks[i], -ctx.measureText(tasks[i]).width / 2, 0);
                ctx.restore();
            }
            
            // The Pointer - Crown Emoji
            ctx.font = '50px serif';
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText('👑', 250, 250); // Centered perfectly
        }

        function rotateWheel() {
            spinTime += 30;
            if(spinTime >= spinTimeTotal) { stopRotateWheel(); return; }
            let spinAngle = spinAngleStart - easeOut(spinTime, 0, spinAngleStart, spinTimeTotal);
            startAngle += (spinAngle * Math.PI / 180);
            drawWheel();
            spinTimeout = setTimeout(rotateWheel, 30);
        }

        function stopRotateWheel() {
            clearTimeout(spinTimeout);
            let degrees = startAngle * 180 / Math.PI + 90;
            let arcd = arc * 180 / Math.PI;
            let index = Math.floor((360 - degrees % 360) / arcd);
            
            confetti({
                particleCount: 200,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#FF8C00', '#ffffff', '#FF4500']
            });

            setTimeout(() => {
                document.getElementById("modal-task").innerHTML = tasks[index];
                document.getElementById("modal").style.display = "flex";
            }, 600);
        }

        function easeOut(t, b, c, d) {
            let ts = (t /= d) * t;
            let tc = ts * t;
            return b + c * (tc + -3 * ts + 3 * t);
        }

        document.getElementById("spin").addEventListener("click", () => {
            document.getElementById("modal").style.display = "none";
            spinAngleStart = Math.random() * 10 + 25;
            spinTime = 0;
            spinTimeTotal = Math.random() * 3000 + 5000;
            rotateWheel();
        });

        document.getElementById("close-modal").addEventListener("click", () => {
            document.getElementById("modal").style.display = "none";
        });

        drawWheel();
    </script>
</body>
</html>
